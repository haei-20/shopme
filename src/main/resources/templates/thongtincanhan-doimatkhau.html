<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>

<body th:class="${showClientNavbar} ? 'with-category-nav' : ''">
    <th:block th:if="${showClientNavbar}"
        th:replace="~{clientTemplate/fragments/giao-dien-chung :: dau_trang_danh_muc}"></th:block>

    <div class="container profile-wrap page-content-shell mb-5">
        <div class="d-flex justify-content-start mb-3">
            <a th:if="${session.nhanVien != null or isNhanVien}" th:href="@{/admin/trangchu}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Quay lại trang quản lý
            </a>
            <a th:href="@{/thongtincanhan}" class="btn btn-outline-secondary btn-sm ms-2"> <i class="bi bi-arrow-left me-1"></i>Trang thông tin</a>
        </div>

        <div th:if="${thongBaoDoiMatKhauSuccess}" class="alert alert-info alert-dismissible fade show" role="alert">
            <span th:text="${thongBaoDoiMatKhauSuccess}">Đổi mật khẩu thành công!</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card profile-card">
                    <div class="card-body p-4 p-lg-5">
                        <h4 class="card-title mb-2">Đổi mật khẩu</h4>
                        <p class="profile-note">Đặt mật khẩu mới để tăng bảo mật tài khoản của bạn.</p>
                        <form id="passwordForm" th:action="@{/thongtincanhan/doimatkhau}" method="post" novalidate>
                            <input type="text" name="username"
                                th:value="${nguoiDung != null ? nguoiDung.tenDangNhap : ''}"
                                autocomplete="username" class="d-none" tabindex="-1" aria-hidden="true" readonly>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label for="matKhauCu" class="form-label">Mật khẩu hiện tại</label>
                                    <input type="password" class="form-control" id="matKhauCu" name="matKhauCu"
                                        autocomplete="current-password"
                                        th:classappend="${matKhauCuError != null ? ' is-invalid' : ''}" required>
                                    <div class="invalid-feedback"
                                        th:text="${matKhauCuError != null ? matKhauCuError : ''}"></div>
                                </div>
                                <div class="col-md-4">
                                    <label for="matKhauMoi" class="form-label">Mật khẩu mới</label>
                                    <input type="password" class="form-control" id="matKhauMoi" name="matKhauMoi"
                                        autocomplete="new-password"
                                        th:classappend="${matKhauMoiError != null ? ' is-invalid' : ''}"
                                        pattern="^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d]{6,}$"
                                        minlength="6" required>
                                    <div class="invalid-feedback"
                                        th:text="${matKhauMoiError != null ? matKhauMoiError : ''}"></div>
                                </div>
                                <div class="col-md-4">
                                    <label for="xacNhanMatKhauMoi" class="form-label">Xác nhận mật khẩu mới</label>
                                    <input type="password" class="form-control" id="xacNhanMatKhauMoi"
                                        autocomplete="new-password"
                                        th:classappend="${xacNhanMatKhauMoiError != null ? ' is-invalid' : ''}"
                                        name="xacNhanMatKhauMoi" minlength="6" required>
                                    <div class="invalid-feedback"
                                        th:text="${xacNhanMatKhauMoiError != null ? xacNhanMatKhauMoiError : ''}"></div>
                                </div>
                            </div>
                            <div class="profile-actions mt-3 d-flex justify-content-end">
                                <button type="submit" class="btn btn-outline-dark px-4">Cập nhật mật khẩu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
