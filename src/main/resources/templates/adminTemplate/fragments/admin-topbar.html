<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <th:block th:fragment="adminTopbar(activeMenu)">
        <style>
            .admin-topbar {
                background: linear-gradient(90deg, #0f172a, #16213f);
                color: #fff;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
            }

            .admin-topbar-brand {
                color: #fff;
                text-decoration: none;
                font-weight: 800;
                font-size: 1.35rem;
            }

            .admin-topbar-brand:hover {
                color: #fff;
            }

            .admin-topbar-search {
                max-width: 480px;
                width: 100%;
            }

            .admin-topbar-search .form-control {
                border-radius: 999px;
                padding-left: 2.5rem;
                border: 1px solid rgba(255, 255, 255, 0.2);
                background: rgba(255, 255, 255, 0.08);
                color: #fff;
            }

            .admin-topbar-search .form-control::placeholder {
                color: rgba(255, 255, 255, 0.7);
            }

            .admin-topbar-search .bi-search {
                position: absolute;
                left: 1rem;
                top: 50%;
                transform: translateY(-50%);
                color: rgba(255, 255, 255, 0.7);
            }

            .admin-topbar-nav {
                background: #fff;
                border-bottom: 1px solid #e5eaf3;
                padding: 0.65rem 1rem;
            }

            .admin-topbar-nav-title {
                font-weight: 700;
                font-size: 0.82rem;
                color: #6b778c;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                margin-bottom: 0.35rem;
                padding-left: 0.15rem;
            }

            .admin-topbar-menu {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.55rem;
            }

            .admin-topbar-item {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                border-radius: 12px;
                padding: 0.5rem 0.8rem;
                color: #24334f;
                font-weight: 600;
                text-decoration: none;
                transition: all 0.2s ease;
                background: #f8fafc;
                border: 1px solid #e5eaf3;
            }

            .admin-topbar-item:hover {
                background: #f1f5ff;
                color: #1b4fd2;
            }

            .admin-topbar-item.active {
                background: #e8f0ff;
                color: #1c64f2;
            }

            .admin-topbar-item i {
                width: 20px;
                text-align: center;
                font-size: 1rem;
            }

            .admin-topbar-avatar {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.16);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                margin-right: 0.45rem;
            }

            @media (max-width: 992px) {
                .admin-topbar-nav {
                    padding: 0.8rem;
                }

                .admin-topbar-menu {
                    gap: 0.45rem;
                }

                .admin-topbar-item {
                    padding: 0.55rem 0.75rem;
                }
            }
        </style>

        <header class="admin-topbar py-2 px-3 px-lg-4">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <div class="fs-4 fw-bold">
                    <a class="admin-topbar-brand" href="/admin/trangchu" th:text="${shopInfo.tenShop} + ' Quản lý'">PGearShop Quản lý</a>
                </div>

                <div class="position-relative admin-topbar-search d-none d-md-block">
                    <i class="bi bi-search"></i>
                    <input id="adminMenuSearch" class="form-control" type="text" placeholder="Tìm menu quản trị, sản phẩm, đơn hàng...">
                </div>

                <div class="d-flex align-items-center">
                    <div class="dropdown" th:if="${nguoiDung != null}">
                        <a class="text-white text-decoration-none dropdown-toggle d-flex align-items-center" href="#" role="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            <span class="admin-topbar-avatar" th:text="${nguoiDung.tenNguoiDung != null and !#strings.isEmpty(nguoiDung.tenNguoiDung) ? #strings.substring(nguoiDung.tenNguoiDung, 0, 1) : 'A'}">A</span>
                            <span th:text="${nguoiDung.tenNguoiDung}">Admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" th:href="@{/thongtincanhan}"><i class="bi bi-person me-2"></i>Hồ sơ</a></li>
                            <li><a class="dropdown-item" th:href="@{/dangxuat}"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </header>

        <nav class="admin-topbar-nav">
            <div class="admin-topbar-nav-title">Quản trị hệ thống</div>
            <div id="adminSidebarMenu" class="admin-topbar-menu">
                <a class="admin-topbar-item" th:classappend="${activeMenu == 'dashboard' ? ' active' : ''}" th:href="@{/admin/trangchu}"><i class="bi bi-speedometer2"></i>Dashboard</a>
                <a class="admin-topbar-item" th:classappend="${activeMenu == 'nguoidung' ? ' active' : ''}" th:href="@{/admin/nguoidung}"><i class="bi bi-people"></i>Khách hàng</a>
                <a class="admin-topbar-item" th:classappend="${activeMenu == 'hoadon' ? ' active' : ''}" th:href="@{/admin/hoadon}"><i class="bi bi-box-seam"></i>Đơn hàng</a>
                <a class="admin-topbar-item" th:classappend="${activeMenu == 'sanpham' ? ' active' : ''}" th:href="@{/admin/quanlysanpham}"><i class="bi bi-cart3"></i>Sản phẩm</a>
                <a class="admin-topbar-item" th:classappend="${activeMenu == 'danhgia' ? ' active' : ''}" th:href="@{/admin/danhgia}"><i class="bi bi-star-half"></i>Đánh giá</a>
                <a class="admin-topbar-item" th:classappend="${activeMenu == 'voucher' ? ' active' : ''}" th:href="@{/admin/voucher}"><i class="bi bi-ticket-perforated"></i>Voucher</a>
                <a class="admin-topbar-item" th:classappend="${activeMenu == 'hienthi' ? ' active' : ''}" th:href="@{/admin/quanlyhienthi}"><i class="bi bi-layout-text-window-reverse"></i>Quản lý hiển thị</a>
                <a class="admin-topbar-item" th:classappend="${activeMenu == 'thuonghieu' ? ' active' : ''}" th:href="@{/admin/thuonghieu}"><i class="bi bi-tags"></i>Thương hiệu</a>
                <a class="admin-topbar-item" th:classappend="${activeMenu == 'thongke' ? ' active' : ''}" th:href="@{/admin/thongke}"><i class="bi bi-graph-up"></i>Thống kê</a>
                <a class="admin-topbar-item" th:classappend="${activeMenu == 'caiDat' ? ' active' : ''}" th:href="@{/admin/thongtinshop}"><i class="bi bi-gear"></i>Cài đặt</a>
            </div>
        </nav>
    </th:block>
</body>

</html>
