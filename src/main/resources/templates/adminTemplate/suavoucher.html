<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý voucher</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <th:block th:replace="adminTemplate/fragments/admin-topbar :: adminTopbar('voucher')"></th:block>
    <h2>Sửa Voucher</h2>
    <div class="container mt-4">
        <form th:action="@{'/admin/voucher/sua/' + ${voucher.id}}" method="post">
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="mb-3">
                <label for="maVoucher" class="form-label">Mã Voucher</label>
                <input type="text" class="form-control" id="maVoucher" name="maVoucher" th:value="${voucher.maVoucher}" required>
            </div>

            <!-- Tên voucher -->
            <div class="mb-3">
                <label for="tenVoucher" class="form-label">Tên Voucher</label>
                <input type="text" class="form-control" id="tenVoucher" name="tenVoucher"
                    th:value="${voucher.tenVoucher}" required>
            </div>

            <div class="mb-3">
                <label for="moTa" class="form-label">Mô tả</label>
                <textarea class="form-control" id="moTa" name="moTa" rows="3" th:text="${voucher.moTa}"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Trạng thái</label>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="kichHoat" name="kichHoat" th:checked="${voucher.kichHoat == null or voucher.kichHoat}">
                    <label class="form-check-label" for="kichHoat">Kích hoạt</label>
                </div>
            </div>

            <!-- Giảm giá -->
            <div class="mb-3">
                <label class="form-label">Giảm giá</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="checkPhanTram"
                        th:checked="${voucher.giamGiaTheoPhanTram != null}" onclick="toggleInput('phanTram')">
                    <label class="form-check-label" for="checkPhanTram">Giảm theo phần trăm (%)</label>
                    <input type="number" step="1" min="0" max="100" class="form-control mt-1" name="giamGiaTheoPhanTram"
                        id="inputPhanTram" th:value="${voucher.giamGiaTheoPhanTram}"
                        th:disabled="${voucher.giamGiaTheoPhanTram == null}">
                </div>
                <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" id="checkVND"
                        th:checked="${voucher.giamGiaCuThe != null}" onclick="toggleInput('vnd')">
                    <label class="form-check-label" for="checkVND">Giảm theo VND</label>
                    <input type="number" step="1000" min="0" class="form-control mt-1" name="giamGiaCuThe" id="inputVND"
                        th:value="${voucher.giamGiaCuThe}" th:disabled="${voucher.giamGiaCuThe == null}">
                </div>
                <div class="mt-3">
                    <label for="giamGiaToiDa" class="form-label">Giảm tối đa (chỉ áp dụng với %)</label>
                    <input type="number" step="1000" min="0" class="form-control" id="giamGiaToiDa" name="giamGiaToiDa"
                        th:value="${voucher.giamGiaToiDa}" placeholder="VD: 200000">
                </div>
            </div>

            <!-- Thời gian áp dụng -->
            <div class="mb-3">
                <label for="ngayBatDau" class="form-label">Thời gian bắt đầu</label>
                <input type="datetime-local" class="form-control" id="ngayBatDau" name="ngayBatDau"
                    th:value="${#temporals.format(voucher.ngayBatDau, 'yyyy-MM-dd''T''HH:mm')}" step="60" required>
                <div class="form-text">Chọn theo định dạng ngày giờ: dd/mm/yyyy HH:mm</div>
            </div>

            <div class="mb-3">
                <label for="thoiHan" class="form-label">Thời hạn kết thúc</label>
                <input type="datetime-local" class="form-control" id="thoiHan" name="thoiHan"
                    th:value="${#temporals.format(voucher.thoiHan, 'yyyy-MM-dd''T''HH:mm')}" step="60" required>
                <div class="form-text">Thời điểm kết thúc phải sau thời điểm bắt đầu.</div>
            </div>

            <div class="mb-3">
                <label for="soLuongNguoiDungToiDa" class="form-label">Số lượng người sử dụng tối đa</label>
                <input type="number" class="form-control" id="soLuongNguoiDungToiDa" name="soLuongNguoiDungToiDa" min="1"
                    th:value="${voucher.soLuongNguoiDungToiDa}" placeholder="Để trống nếu không giới hạn">
            </div>

            <!-- Đơn tối thiểu -->
            <div class="mb-3">
                <label for="donToiThieu" class="form-label">Đơn tối thiểu (VND)</label>
                <input type="number" step="1000" min="0" class="form-control" id="donToiThieu" name="donToiThieu"
                    th:value="${voucher.donToiThieu}" required>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
            <a href="/admin/voucher" class="btn btn-secondary">Hủy</a>
        </form>
    </div>

    <script>
        function toggleInput(type) {
            if (type === 'phanTram') {
                document.getElementById('inputPhanTram').disabled = !document.getElementById('inputPhanTram').disabled;
                document.getElementById('checkVND').checked = false;
                document.getElementById('inputVND').disabled = true;
            } else if (type === 'vnd') {
                document.getElementById('inputVND').disabled = !document.getElementById('inputVND').disabled;
                document.getElementById('checkPhanTram').checked = false;
                document.getElementById('inputPhanTram').disabled = true;
            }
        }
    </script>
</body>

</html>
