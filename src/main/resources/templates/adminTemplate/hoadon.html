<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="pageTitle='Quản lý đơn hàng'">

<head th:replace="~{adminTemplate/fragments/admin-head :: head('Quản lý đơn hàng')}">
</head>

<body class="admin-body">
    <th:block th:replace="adminTemplate/fragments/admin-topbar :: adminTopbar('hoadon')"></th:block>
    <div class="container mt-5">
        <div class="container mt-5">
            <h2 class="mb-3">Quản lý Hóa đơn</h2>

            <form class="row g-2 mb-3" method="get" action="#" th:action="@{/admin/hoadon}">
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-0">Mã hóa đơn</label>
                    <input type="text" name="maHoaDon" class="form-control" placeholder="VD: HD001" th:value="${maHoaDon}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-0">Tên khách hàng</label>
                    <input type="text" name="tenKhachHang" class="form-control" placeholder="Tên khách đặt hàng"
                        th:value="${tenKhachHang}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-0">Trạng thái</label>
                    <select name="trangThai" class="form-select">
                        <option value="">Tất cả</option>
                        <option th:each="tt : ${cacTrangThaiDon}" th:value="${tt}" th:text="${tt}"
                            th:selected="${trangThai == tt}">Trạng thái</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-0">Từ ngày</label>
                    <input type="date" name="tuNgay" class="form-control" th:value="${tuNgay}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-0">Đến ngày</label>
                    <input type="date" name="denNgay" class="form-control" th:value="${denNgay}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-0">Sắp xếp ngày</label>
                    <select name="sortOrder" class="form-select">
                        <option value="desc" th:selected="${sortOrder == 'desc'}">Mới nhất</option>
                        <option value="asc" th:selected="${sortOrder == 'asc'}">Cũ nhất</option>
                    </select>
                </div>
                <div class="col-md-4 d-flex gap-2 align-items-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-search"></i> Lọc
                    </button>
                    <a th:href="@{/admin/hoadon}" class="btn btn-outline-secondary">Xóa lọc</a>
                </div>
            </form>
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-primary">
                        <tr>
                            <th scope="col">Mã Hóa đơn</th>
                            <th scope="col">Khách hàng đặt</th>
                            <th scope="col">Tổng tiền</th>
                            <th scope="col">Ngày tạo</th>
                            <th scope="col">Trạng thái</th>
                            <th scope="col">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="hd : ${hoaDons}">
                            <td th:text="${hd.maHoaDon}"></td>
                            <td th:text="${tenKhachDatByHoaDonId[hd.id]}"></td>
                            <td>
                                <span th:text="${#numbers.formatDecimal(hd.tongGia, 0, 'COMMA', 2, 'POINT')}"></span> đ
                            </td>
                            <td th:text="${#temporals.format(hd.ngayTao, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <th:block th:replace="~{clientTemplate/fragments/trangthaidon :: badge(trangThai=${hd.trangThaiDonHang})}"></th:block>
                            </td>
                            <td>
                                <a th:href="@{/admin/hoadon/chitiet/{id}(id=${hd.id})}" class="btn btn-sm btn-info">
                                    <i class="bi bi-eye"></i> Xem chi tiết
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    <th:block th:replace="~{adminTemplate/fragments/admin-scripts :: scripts}"></th:block>
</body>

</html>
