<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="pageTitle='Chi tiết Voucher'">

<head th:replace="~{adminTemplate/fragments/admin-head :: head(${pageTitle})}">
</head>

<body class="admin-body">

    <th:block th:replace="adminTemplate/fragments/admin-topbar :: adminTopbar('voucher')"></th:block>
    <div class="container mt-4 mb-5">
        <div class="voucher-detail-wrap">
            <div class="voucher-header mb-4 d-flex justify-content-between align-items-start gap-3 flex-wrap">
                <div>
                    <div class="voucher-code" th:text="${voucher.maVoucher}">VOUCHER_CODE</div>
                    <h2 class="voucher-name" th:text="${voucher.tenVoucher}">Tên Voucher</h2>
                </div>
                <span class="badge fs-6"
                    th:classappend="${voucher.kichHoat == null or voucher.kichHoat} ? ' text-bg-success' : ' text-bg-secondary'"
                    th:text="${voucher.kichHoat == null or voucher.kichHoat ? 'Kích hoạt' : 'Tạm tắt'}">Kích hoạt</span>
            </div>

            <div class="detail-card p-4 mb-4">
                <div class="detail-grid">
                    <div class="detail-item" style="grid-column: 1 / -1;">
                        <div class="detail-label">Mô tả</div>
                        <p class="detail-value" th:text="${voucher.moTa != null and !#strings.isEmpty(voucher.moTa) ? voucher.moTa : 'Không có mô tả'}"></p>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">Loại giảm giá</div>
                        <p class="detail-value"
                            th:text="${voucher.giamGiaTheoPhanTram != null ? 'Giảm theo phần trăm' : (voucher.giamGiaCuThe != null ? 'Giảm số tiền cố định' : 'Chưa cấu hình')}"></p>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">Giá trị giảm</div>
                        <p class="detail-value" th:text="${voucher.giamGiaTheoPhanTram != null ? voucher.giamGiaTheoPhanTram + '%' : (voucher.giamGiaCuThe != null ? #numbers.formatDecimal(voucher.giamGiaCuThe, 0, 'COMMA', 0, 'POINT') + ' VND' : 'N/A')}"></p>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">Giảm tối đa</div>
                        <p class="detail-value"
                            th:text="${voucher.giamGiaToiDa != null ? #numbers.formatDecimal(voucher.giamGiaToiDa, 0, 'COMMA', 0, 'POINT') + ' VND' : 'Không giới hạn'}"></p>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">Đơn tối thiểu</div>
                        <p class="detail-value" th:text="${voucher.donToiThieu != null ? #numbers.formatDecimal(voucher.donToiThieu, 0, 'COMMA', 0, 'POINT') + ' VND' : '0 VND'}"></p>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">Thời gian bắt đầu</div>
                        <p class="detail-value"
                            th:text="${voucher.ngayBatDau != null ? #temporals.format(voucher.ngayBatDau, 'dd/MM/yyyy HH:mm') : 'N/A'}"></p>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">Thời hạn kết thúc</div>
                        <p class="detail-value"
                            th:text="${voucher.thoiHan != null ? #temporals.format(voucher.thoiHan, 'dd/MM/yyyy HH:mm') : 'N/A'}"></p>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">Số lượng người dùng tối đa</div>
                        <p class="detail-value"
                            th:text="${voucher.soLuongNguoiDungToiDa != null ? voucher.soLuongNguoiDungToiDa : 'Không giới hạn'}"></p>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">Người được cấp</div>
                        <p class="detail-value mb-2" th:text="${nguoiDuocCap}"></p>
                        <ul class="customer-list" th:if="${nguoiDuocCap == 'Khách hàng cụ thể'}">
                            <li th:each="mapping : ${danhSachKhachHang}">
                                <span th:text="${mapping.khachHang.maKhachHang + ' - ' + mapping.khachHang.nguoiDung.tenNguoiDung}"></span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2 justify-content-end">
                <a href="/admin/voucher" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Quay lại
                </a>
                <a th:href="@{'/admin/voucher/sua/' + ${voucher.id}}" class="btn btn-primary">
                    <i class="bi bi-pencil-square"></i> Sửa voucher
                </a>
            </div>
        </div>
    </div>

    <th:block th:replace="~{adminTemplate/fragments/admin-scripts :: scripts}"></th:block>
</body>

</html>
