<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:with="pageTitle='Quản lý đánh giá'">

<head th:replace="~{adminTemplate/fragments/admin-head :: head(${pageTitle})}">
</head>

<body class="admin-body">
    <th:block th:replace="adminTemplate/fragments/admin-topbar :: adminTopbar('danhgia')"></th:block>

    <main class="admin-page container py-4">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="admin-page-toolbar align-items-start mb-4">
            <div>
                <h1 class="h4 mb-1">Quản lý đánh giá sản phẩm</h1>
            </div>
        </div>

        <form class="row g-2 align-items-end mb-4" th:action="@{/admin/danhgia}" method="get">
            <div class="col-md-2">
                <label class="form-label small text-muted mb-0" for="locSanPhamId">Sản phẩm</label>
                <select class="form-select" id="locSanPhamId" name="sanPhamId">
                    <option value="">Tất cả</option>
                    <option th:each="sp : ${dsSanPhamLoc}" th:value="${sp.id}"
                        th:selected="${sanPhamIdLoc != null and sanPhamIdLoc == sp.id}"
                        th:text="${sp.id}">1</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small text-muted mb-0" for="locSanPhamTen">Tên sản phẩm</label>
                <select class="form-select" id="locSanPhamTen">
                    <option value="">Tất cả</option>
                    <option th:each="sp : ${dsSanPhamLoc}" th:value="${sp.id}"
                        th:selected="${sanPhamIdLoc != null and sanPhamIdLoc == sp.id}"
                        th:text="${sp.tenSanPham != null ? sp.tenSanPham : '—'}">Sản phẩm</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-0">Khách hàng</label>
                <input type="text" name="khachHang" class="form-control" placeholder="Tên đăng nhập"
                    th:value="${khachHangLoc}">
            </div>
            <div class="col-md-1">
                <label class="form-label small text-muted mb-0">Sao</label>
                <select class="form-select" name="soSao">
                    <option value="">Tất cả</option>
                    <option value="5" th:selected="${soSaoLoc == 5}">5</option>
                    <option value="4" th:selected="${soSaoLoc == 4}">4</option>
                    <option value="3" th:selected="${soSaoLoc == 3}">3</option>
                    <option value="2" th:selected="${soSaoLoc == 2}">2</option>
                    <option value="1" th:selected="${soSaoLoc == 1}">1</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-0">Từ ngày</label>
                <input type="date" name="tuNgay" class="form-control" th:value="${tuNgayLoc}">
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-0">Đến ngày</label>
                <input type="date" name="denNgay" class="form-control" th:value="${denNgayLoc}">
            </div>
            <div class="col-md-auto d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Lọc</button>
                <a th:href="@{/admin/danhgia}" class="btn btn-outline-secondary">Xóa lọc</a>
            </div>
        </form>

        <div class="table-responsive card border-0 shadow-sm">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th style="width:70px">ID</th>
                        <th>Sản phẩm</th>
                        <th>Khách hàng</th>
                        <th style="width:100px">Sao</th>
                        <th>Nội dung</th>
                        <th style="width:150px">Ngày</th>
                        <th style="width:180px">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(danhGias)}">
                        <td colspan="7" class="text-center text-muted py-4">Chưa có đánh giá nào.</td>
                    </tr>
                    <tr th:each="dg : ${danhGias}">
                        <td th:text="${dg.id}">1</td>
                        <td>
                            <a th:href="@{/chitietsanpham/{id}(id=${dg.sanPham.id})}" target="_blank" rel="noopener"
                                class="fw-medium" th:text="${dg.sanPham.tenSanPham}">SP</a>
                            <div class="small text-muted font-monospace" th:text="${dg.sanPham.maSanPham}">MA</div>
                        </td>
                        <td>
                            <span th:if="${dg.khachHang != null and dg.khachHang.nguoiDung != null}"
                                th:text="${dg.khachHang.nguoiDung.tenNguoiDung}">Tên</span>
                            <span th:unless="${dg.khachHang != null and dg.khachHang.nguoiDung != null}">—</span>
                            <div class="small text-muted" th:if="${dg.khachHang != null}"
                                th:text="'KH #' + ${dg.khachHang.id}">#</div>
                        </td>
                        <td>
                            <span class="text-warning" th:each="i : ${#numbers.sequence(1, 5)}">
                                <i class="bi bi-star-fill" th:if="${i <= dg.soSao}"></i>
                                <i class="bi bi-star" th:unless="${i <= dg.soSao}"></i>
                            </span>
                        </td>
                        <td>
                            <div class="text-break small" style="max-width: 360px; max-height: 4.5rem; overflow: auto;"
                                th:text="${dg.noiDung}">Nội dung</div>
                        </td>
                        <td class="small text-muted"
                            th:text="${dg.ngayDanhGia != null ? #temporals.format(dg.ngayDanhGia, 'dd/MM/yyyy HH:mm') : '—'}">—</td>
                        <td>
                            <a class="btn btn-sm btn-outline-primary mb-1"
                                th:href="|/chitietsanpham/${dg.sanPham.id}#danh-gia-${dg.id}|"
                                target="_blank" rel="noopener" title="Mở đánh giá trên trang sản phẩm">
                                <i class="bi bi-chat-left-text"></i> Đánh giá
                            </a>
                            <form th:action="@{/admin/danhgia/xoa/{id}(id=${dg.id})}" method="post" class="d-inline"
                                onsubmit="return confirm('Xóa đánh giá này?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i> Xóa
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        (function () {
            var idSel = document.getElementById('locSanPhamId');
            var tenSel = document.getElementById('locSanPhamTen');
            if (!idSel || !tenSel) return;
            idSel.addEventListener('change', function () { tenSel.value = idSel.value; });
            tenSel.addEventListener('change', function () { idSel.value = tenSel.value; });
        })();
    </script>
    <th:block th:replace="~{adminTemplate/fragments/admin-scripts :: scripts}"></th:block>
</body>

</html>
