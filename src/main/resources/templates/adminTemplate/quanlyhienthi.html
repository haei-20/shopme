<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý hiển thị</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <th:block th:replace="adminTemplate/fragments/admin-topbar :: adminTopbar('hienthi')"></th:block>

    <div class="container mt-4 mb-5" style="max-width: 980px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h2 class="mb-1">Quản lý hiển thị trang chủ</h2>
                <p class="text-muted mb-0">Chỉ giữ lại các chức năng banner và cách hiển thị sản phẩm.</p>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/admin/quanlyhienthi}" method="post" enctype="multipart/form-data" class="card shadow-sm p-4">
            <div class="mb-4">
                <h4 class="mb-3">1. Banner trang chủ</h4>

                <div class="mb-3">
                    <label class="form-label">Nguồn banner</label>
                    <select class="form-select" id="bannerSourceType" name="bannerSourceType">
                        <option value="UPLOAD" th:selected="${displayConfig.bannerSourceType == 'UPLOAD'}">Tải ảnh mới lên</option>
                        <option value="PRODUCT" th:selected="${displayConfig.bannerSourceType == 'PRODUCT'}">Dùng ảnh sản phẩm có sẵn</option>
                    </select>
                </div>

                <div id="uploadBannerBlock" class="mb-3">
                    <label class="form-label">Ảnh banner tải lên</label>
                    <input type="file" class="form-control" id="bannerImageFile" name="bannerImageFile" accept="image/*">
                    <div class="form-text" th:if="${displayConfig.uploadedBannerImage != null}">
                        Ảnh hiện tại: <span th:text="${displayConfig.uploadedBannerImage}"></span>
                    </div>
                </div>

                <div id="productBannerBlock" class="mb-3">
                    <label class="form-label">Chọn sản phẩm làm banner</label>
                    <select class="form-select" id="bannerProductId" name="bannerProductId">
                        <option value="">-- Chọn sản phẩm --</option>
                        <option th:each="sp : ${dsSanPham}"
                                th:value="${sp.id}"
                                th:selected="${displayConfig.bannerProductId == sp.id}"
                                th:attr="data-image-url=@{/images/product/{img}(img=${sp.hinhAnh})}"
                                th:text="${sp.maSanPham + ' - ' + sp.tenSanPham}">
                        </option>
                    </select>
                </div>

                <div class="mt-3">
                    <label class="form-label">Xem trước banner</label>
                    <div class="border rounded p-2 bg-light">
                        <img id="bannerPreviewImage" th:src="${bannerImageUrl}" alt="Banner preview" class="img-fluid rounded"
                             style="max-height: 260px; width: 100%; object-fit: cover;">
                    </div>
                </div>
            </div>

            <hr>

            <div class="mb-4">
                <h4 class="mb-3">2. Hiển thị sản phẩm</h4>

                <div class="mb-3">
                    <label class="form-label">Thứ tự hiển thị sản phẩm</label>
                    <select class="form-select" name="productDisplayOrder">
                        <option value="BEST_SELLING" th:selected="${displayConfig.productDisplayOrder == 'BEST_SELLING'}">Bán chạy</option>
                        <option value="NEWEST" th:selected="${displayConfig.productDisplayOrder == 'NEWEST'}">Mới nhất</option>
                        <option value="PRICE_ASC" th:selected="${displayConfig.productDisplayOrder == 'PRICE_ASC'}">Giá tăng dần</option>
                        <option value="PRICE_DESC" th:selected="${displayConfig.productDisplayOrder == 'PRICE_DESC'}">Giá giảm dần</option>
                        <option value="NAME_ASC" th:selected="${displayConfig.productDisplayOrder == 'NAME_ASC'}">Tên A đến Z</option>
                    </select>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Số lượng sản phẩm 1 hàng</label>
                        <input type="number" class="form-control" name="productsPerRow" min="1" max="6"
                               th:value="${displayConfig.productsPerRow}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Số lượng hàng của mỗi mục</label>
                        <input type="number" class="form-control" name="numberOfRows" min="1" max="6"
                               th:value="${displayConfig.numberOfRows}">
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-floppy"></i> Lưu thay đổi
                </button>
                <a th:href="@{/admin/trangchu}" class="btn btn-secondary">Quay lại</a>
            </div>
        </form>
    </div>

    <script>
        const bannerSourceType = document.getElementById('bannerSourceType');
        const uploadBannerBlock = document.getElementById('uploadBannerBlock');
        const productBannerBlock = document.getElementById('productBannerBlock');
        const bannerImageFile = document.getElementById('bannerImageFile');
        const bannerProductId = document.getElementById('bannerProductId');
        const bannerPreviewImage = document.getElementById('bannerPreviewImage');
        const initialBannerPreviewSrc = bannerPreviewImage.src;

        function toggleBannerInputs() {
            const isUpload = bannerSourceType.value === 'UPLOAD';
            uploadBannerBlock.style.display = isUpload ? 'block' : 'none';
            productBannerBlock.style.display = isUpload ? 'none' : 'block';

            if (!isUpload) {
                updateProductBannerPreview();
            }
        }

        function updateProductBannerPreview() {
            const selectedOption = bannerProductId.options[bannerProductId.selectedIndex];
            const imageUrl = selectedOption ? selectedOption.getAttribute('data-image-url') : null;
            bannerPreviewImage.src = imageUrl || initialBannerPreviewSrc;
        }

        bannerImageFile.addEventListener('change', function () {
            const file = this.files && this.files[0];
            if (!file) {
                if (bannerSourceType.value === 'PRODUCT') {
                    updateProductBannerPreview();
                } else {
                    bannerPreviewImage.src = initialBannerPreviewSrc;
                }
                return;
            }

            bannerPreviewImage.src = URL.createObjectURL(file);
            bannerSourceType.value = 'UPLOAD';
            toggleBannerInputs();
        });

        bannerProductId.addEventListener('change', function () {
            bannerSourceType.value = 'PRODUCT';
            toggleBannerInputs();
        });

        bannerSourceType.addEventListener('change', toggleBannerInputs);
        toggleBannerInputs();
    </script>

</body>

</html>
