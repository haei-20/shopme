<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử giao dịch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/v4-shims.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>

<body class="with-category-nav">
    <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: dau_trang_danh_muc}"></div>

    <div class="container page-content-shell">
        <h2 class="mb-4">Lịch sử giao dịch</h2>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form method="get" th:action="@{/lichsugiaodich}" class="row g-3 mb-4">
            <div class="col-md-4">
                <label for="sortBy" class="form-label">Sắp xếp:</label>
                <select id="sortBy" name="sortBy" class="form-select">
                    <option th:selected="${selectedSort == null}" value="">--Chọn--</option>
                    <option th:selected="${selectedSort == 'ngayTaoDesc'}" value="ngayTaoDesc">Mới nhất</option>
                    <option th:selected="${selectedSort == 'ngayTaoAsc'}" value="ngayTaoAsc">Cũ nhất</option>
                    <option th:selected="${selectedSort == 'tongGia'}" value="tongGia">Tổng giá cao đến thấp</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="trangThai" class="form-label">Trạng thái:</label>
                <select id="trangThai" name="trangThai" class="form-select">
                    <option th:selected="${selectedTrangThai == null}" value="">Tất cả</option>
                    <option th:selected="${selectedTrangThai == 'Chờ xác nhận'}" value="Chờ xác nhận">Chờ xác nhận</option>
                    <option th:selected="${selectedTrangThai == 'Đang chuẩn bị hàng'}" value="Đang chuẩn bị hàng">Đang chuẩn bị hàng</option>
                    <option th:selected="${selectedTrangThai == 'Chờ giao hàng'}" value="Chờ giao hàng">Chờ giao hàng</option>
                    <option th:selected="${selectedTrangThai == 'Đã giao'}" value="Đã giao">Đã giao</option>
                    <option th:selected="${selectedTrangThai == 'Trả hàng'}" value="Trả hàng">Trả hàng</option>
                    <option th:selected="${selectedTrangThai == 'Đã hủy'}" value="Đã hủy">Đã hủy</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-primary">Lọc</button>
            </div>
        </form>

        <table class="table table-bordered table-hover mt-3">
            <thead>
                <tr>
                    <th style="color: white;">Mã hóa đơn</th>
                    <th style="color: white;">Người nhận</th>
                    <th style="color: white;">Email</th>
                    <th style="color: white;">SĐT</th>
                    <th style="color: white;">Tổng giá</th>
                    <th style="color: white;">Ngày tạo</th>
                    <th style="color: white;">Trạng thái</th>
                    <th style="color: white;">Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="hoaDon : ${hoaDonKhachHang}">
                    <td th:text="${hoaDon.maHoaDon}"></td>
                    <td th:text="${hoaDon.thongTinNhanHang.tenNguoiNhan}"></td>
                    <td th:text="${hoaDon.thongTinNhanHang.email}"></td>
                    <td th:text="${hoaDon.thongTinNhanHang.sdt}"></td>
                    <td th:text="${#numbers.formatDecimal(hoaDon.tongGia, 0, 'COMMA', 0, 'POINT')}"></td>
                    <td th:text="${#temporals.format(hoaDon.ngayTao, 'dd/MM/yyyy')}"></td>
                    <td>
                        <th:block th:replace="~{clientTemplate/fragments/trangthaidon :: badge(trangThai=${hoaDon.trangThaiDonHang})}"></th:block>
                    </td>
                    <td>
                        <a th:href="@{'/lichsugiaodich/' + ${hoaDon.id}}" class="btn btn-sm btn-primary">Xem chi
                            tiết</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

<div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chatbot}"></div>

<div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chan_trang}"></div>
<th:block th:replace="~{clientTemplate/fragments/giao-dien-chung :: tap_lenh_chung}"></th:block>

</html>
