<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${shopInfo.tenShop} + ' - Trang Chủ'"></title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body class="with-category-nav" th:style="|--home-banner-h: ${homeBannerHeightPx}px|">
    <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: dau_trang_danh_muc}"></div>
    <style th:if="${displayConfig.showCategoryNav == false}">
        .category-bar {
            display: none !important;
        }
    </style>

    <th:block th:each="sectionKey : ${homeSectionOrder}">
        <th:block th:switch="${sectionKey}">
            <th:block th:case="'banner'">
                <div class="banner banner--slider position-relative overflow-hidden" th:if="${displayConfig.showBanner != false and useBannerSlider}"
                     th:style="|--home-banner-h: ${homeBannerHeightPx}px; height: var(--home-banner-h); min-height: var(--home-banner-h);|">
                    <div id="homeBannerCarousel" class="carousel slide carousel-fade position-absolute top-0 start-0 w-100 h-100"
                         data-bs-ride="carousel"
                         th:attr="data-bs-interval=${bannerSliderIntervalMs}">
                        <div class="carousel-inner h-100">
                            <div th:each="slideUrl, iter : ${bannerSliderUrls}" class="carousel-item h-100"
                                 th:classappend="${iter.first} ? 'active'">
                                <div class="banner-slide-bg h-100 w-100"
                                     th:style="|background-image: linear-gradient(135deg, rgba(255, 193, 7, 0.15), rgba(255, 255, 255, 0.2)), url('${slideUrl}')|"></div>
                            </div>
                        </div>
                        <button class="carousel-control-prev" type="button" data-bs-target="#homeBannerCarousel" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Trước</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#homeBannerCarousel" data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Sau</span>
                        </button>
                    </div>
                    <div class="banner-text position-relative" style="z-index: 2;" th:if="${displayConfig.showBannerOverlayText != false}">
                        <h1 th:text="${homeBannerTitleCustom != null} ? ${homeBannerTitleCustom} : ('Chào mừng đến với ' + ${shopInfo.tenShop})"></h1>
                        <p th:text="${homeBannerSubtitleCustom != null} ? ${homeBannerSubtitleCustom} : 'Nơi cung cấp linh kiện máy tính chất lượng và giá tốt nhất!'"></p>
                    </div>
                </div>
                <div class="banner" th:if="${displayConfig.showBanner != false and !useBannerSlider}"
                    th:style="|--home-banner-h: ${homeBannerHeightPx}px; height: var(--home-banner-h); min-height: var(--home-banner-h); background-image: linear-gradient(135deg, rgba(255, 193, 7, 0.15), rgba(255, 255, 255, 0.2)), url('${bannerImageUrl}');|">
                    <div class="banner-text" th:if="${displayConfig.showBannerOverlayText != false}">
                        <h1 th:text="${homeBannerTitleCustom != null} ? ${homeBannerTitleCustom} : ('Chào mừng đến với ' + ${shopInfo.tenShop})"></h1>
                        <p th:text="${homeBannerSubtitleCustom != null} ? ${homeBannerSubtitleCustom} : 'Nơi cung cấp linh kiện máy tính chất lượng và giá tốt nhất!'"></p>
                    </div>
                </div>
            </th:block>
            <th:block th:case="'featured'">
                <div class="home-product-section" th:if="${displayConfig.showSectionFeatured != false}">
                    <h2 class="mb-4 border-bottom border-warning pb-2" th:text="${homeTitleFeatured}">Sản phẩm nổi bật</h2>
                    <div class="home-product-grid"
                        th:style="'--products-per-row:' + ${featuredProductsPerRow}">
                        <a th:each="sp : ${sanPhamBanChay}" th:href="@{/chitietsanpham/{id}(id=${sp.id})}" class="product-card">
                            <img th:src="@{/images/product/{img}(img=${sp.hinhAnh})}" alt="Ảnh sản phẩm" class="product-image">
                            <div class="product-name" th:text="${sp.tenSanPham}">Tên Sản phẩm</div>
                            <div class="product-info" th:text="'Đã bán: ' + ${sp.daBan}">Đã bán</div>
                            <div class="product-price" th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + '₫'">Giá</div>
                        </a>
                    </div>
                </div>
            </th:block>
            <th:block th:case="'recommended'">
                <th:block th:if="${displayConfig.showSectionRecommended != false}">
                    <h2 class="mb-4 border-bottom border-warning pb-2" th:text="${homeTitleRecommended}">Danh mục sản phẩm dành cho bạn</h2>
                    <div class="home-product-grid"
                        th:style="'--products-per-row:' + ${recommendedProductsPerRow}">
                        <a th:each="sp : ${sanPhamGoiY}" th:href="@{/chitietsanpham/{id}(id=${sp.id})}" class="product-card">
                            <img th:src="@{/images/product/{img}(img=${sp.hinhAnh})}" alt="Ảnh sản phẩm" class="product-image">
                            <div class="product-name" th:text="${sp.tenSanPham}">Tên Sản phẩm</div>
                            <div class="product-info" th:text="'Đã bán: ' + ${sp.daBan}">Đã bán</div>
                            <div class="product-price" th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + '₫'">Giá</div>
                        </a>
                    </div>
                </th:block>
            </th:block>
            <th:block th:case="'recentlyViewed'">
                <th:block th:if="${displayConfig.showSectionRecentlyViewed != false}">
                    <h2 class="mb-4 border-bottom border-warning pb-2" th:text="${homeTitleRecentlyViewed}">Danh mục sản phẩm vừa xem</h2>
                    <div class="home-product-grid"
                        th:style="'--products-per-row:' + ${recentlyViewedProductsPerRow}">
                        <a th:each="sp : ${danhSachSanPhamDaXem}" th:href="@{/chitietsanpham/{id}(id=${sp.id})}" class="product-card">
                            <img th:src="@{/images/product/{img}(img=${sp.hinhAnh})}" alt="Ảnh sản phẩm" class="product-image">
                            <div class="product-name" th:text="${sp.tenSanPham}">Tên Sản phẩm</div>
                            <div class="product-info" th:text="'Đã bán: ' + ${sp.daBan}">Đã bán</div>
                            <div class="product-price" th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + '₫'">Giá</div>
                        </a>
                    </div>
                </th:block>
            </th:block>
            <th:block th:case="'byCategory'">
                <th:block th:if="${displayConfig.showSectionByCategory != false}">
                    <h2 class="mb-4 border-bottom border-warning pb-2" th:text="${homeTitleByCategory}">Linh kiện ngon bổ rẻ</h2>
                    <section th:each="entry : ${sanPhamTheoLoai}">
                        <h3 class="m-4" th:text="${entry.key}">Mainboard</h3>
                        <div class="home-product-grid"
                            th:style="'--products-per-row:' + ${byCategoryProductsPerRow}">
                            <a th:each="sp : ${entry.value}" th:href="@{/chitietsanpham/{id}(id=${sp.id})}" class="product-card">
                                <img th:src="@{/images/product/{img}(img=${sp.hinhAnh})}" th:alt="${sp.tenSanPham}"
                                    class="product-image" />
                                <div class="product-name" th:text="${sp.tenSanPham}">Tên Sản phẩm</div>
                                <div class="product-price" th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + '₫'">Giá</div>
                            </a>
                        </div>
                    </section>
                </th:block>
            </th:block>
        </th:block>
    </th:block>

    <th:block th:if="${displayConfig.showChatbot != false}">
        <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chatbot}"></div>
    </th:block>

    <th:block th:if="${displayConfig.showFooter != false}">
        <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chan_trang}"></div>
    </th:block>

    <th:block th:replace="~{clientTemplate/fragments/giao-dien-chung :: tap_lenh_chung}"></th:block>
    <script>
        const currentPath = window.location.pathname.toLowerCase();
        document.querySelectorAll('.category-pill').forEach((link) => {
            const linkPath = new URL(link.href, window.location.origin).pathname.toLowerCase();
            if (currentPath === linkPath) {
                link.classList.add('is-active');
            }
        });
    </script>
</body>

</html>
