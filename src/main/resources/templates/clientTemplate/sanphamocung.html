<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="with-category-nav">
    <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: dau_trang_danh_muc}"></div>
    <div th:replace="~{clientTemplate/fragments/bo-loc-sanpham :: boLocOcung}"></div>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="ocung : ${dsOCung}">
            <a th:href="@{/chitietsanpham/{sanPhamID}(sanPhamID=${ocung.sanPham.id})}"
            class="card product-card h-100 text-decoration-none">
                <img th:src="@{/images/product/{img}(img=${ocung.sanPham.hinhAnh})}" class="card-img-top"
                    alt="Hình ảnh sản phẩm">
                <div class="card-body">
                    <h5 class="card-title"><br th:remove="tag" />
                        <span th:text="${ocung.sanPham.tenSanPham}"></span>
                    </h5>
                    <p class="card-text">Giá: <span
                            th:text="${#numbers.formatDecimal(ocung.sanPham.gia, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                    </p>
                </div>
            </a>
        </div>
    </div>
    <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chatbot}"></div>
</body>
<div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chan_trang}"></div>
<th:block th:replace="~{clientTemplate/fragments/giao-dien-chung :: tap_lenh_chung}"></th:block>

</html>
