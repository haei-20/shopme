<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="login-container">
        <h2>Quên mật khẩu</h2>

        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>

        <div class="card p-3 mb-3">
            <h5 class="mb-3">Bước 1: Gửi mã xác nhận qua email</h5>
            <form th:action="@{/quen-mat-khau/gui-ma}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label">Email đã đăng ký</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Nhập email" required>
                </div>
                <button type="submit" class="btn btn-warning w-100">Gửi mã xác nhận</button>
            </form>
        </div>

        <div class="card p-3 mb-4" th:if="${step == 'verify'}">
            <h5 class="mb-3">Bước 2: Xác nhận mã và đặt mật khẩu mới</h5>
            <form th:action="@{/quen-mat-khau/xac-nhan}" method="post">
                <div class="mb-3">
                    <label for="maXacNhan" class="form-label">Mã xác nhận</label>
                    <input type="text" id="maXacNhan" name="maXacNhan" class="form-control" placeholder="Nhập mã 6 số" required>
                </div>
                <div class="mb-3">
                    <label for="matKhauMoi" class="form-label">Mật khẩu mới</label>
                    <input type="password" id="matKhauMoi" name="matKhauMoi" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="xacNhanMatKhauMoi" class="form-label">Xác nhận mật khẩu mới</label>
                    <input type="password" id="xacNhanMatKhauMoi" name="xacNhanMatKhauMoi" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Đặt lại mật khẩu</button>
            </form>
        </div>

        <a class="btn btn-warning w-100" th:href="@{/dangnhap}">Quay lại đăng nhập</a>
    </div>
</body>

</html>
