<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết giao dịch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/v4-shims.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>

<body class="with-category-nav">
    <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: dau_trang_danh_muc}"></div>

    <div class="container page-content-shell">
        <h2 class="mb-4">Chi tiết giao dịch</h2>

        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Thông tin hóa đơn</h5>
                <p><strong>Mã hóa đơn:</strong> <span th:text="${hoaDon.maHoaDon}"></span></p>
                <p><strong>Người nhận:</strong> <span th:text="${hoaDon.thongTinNhanHang.tenNguoiNhan}"></span></p>
                <p><strong>Email:</strong> <span th:text="${hoaDon.thongTinNhanHang.email}"></span></p>
                <p><strong>SĐT:</strong> <span th:text="${hoaDon.thongTinNhanHang.sdt}"></span></p>
                <p><strong>Tổng giá:</strong> <span
                        th:text="${#numbers.formatDecimal(hoaDon.tongGia, 0, 'COMMA', 2, 'POINT')}"></span></p>
                <p><strong>Ngày tạo:</strong> <span th:text="${#temporals.format(hoaDon.ngayTao, 'dd/MM/yyyy')}"></span>
                </p>
                <p><strong>Trạng thái:</strong>
                    <th:block th:replace="~{clientTemplate/fragments/trangthaidon :: badge(trangThai=${hoaDon.trangThaiDonHang})}"></th:block>
                </p>
            </div>
        </div>
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mt-3" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <h5>Danh sách sản phẩm đã mua</h5>
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Tên sản phẩm</th>
                    <th>Số lượng</th>
                    <th>Đơn giá</th>
                    <th>Thành tiền</th>
                    <th th:if="${hoaDon.trangThaiDonHang == 'Đã giao'}">Đánh giá</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${danhSachSanPham}">
                    <td>
                        <a th:if="${item.sanPham != null}"
                            th:href="@{/chitietsanpham/{id}(id=${item.sanPham.id})}"
                            th:text="${item.sanPham.tenSanPham}"
                            class="text-decoration-none"></a>
                        <span th:if="${item.sanPham == null}">(Sản phẩm không còn trong hệ thống)</span>
                    </td>
                    <td th:text="${item.hoaDonChiTiet.soLuongSP}"></td>
                    <td>
                        <span th:text="${#numbers.formatDecimal(item.hoaDonChiTiet.soLuongSP != null and item.hoaDonChiTiet.soLuongSP > 0
                            ? item.hoaDonChiTiet.thanhTien / item.hoaDonChiTiet.soLuongSP
                            : 0, 0, 'COMMA', 0, 'POINT')}"></span>
                    </td>
                    <td th:text="${#numbers.formatDecimal(item.hoaDonChiTiet.thanhTien, 0, 'COMMA', 0, 'POINT')}"></td>
                    <td th:if="${hoaDon.trangThaiDonHang == 'Đã giao'}">
                        <th:block th:if="${item.sanPham != null}">
                            <a th:if="${coTheDanhGiaSanPham[item.sanPham.id] and !daDanhGiaSanPham[item.sanPham.id]}"
                                th:href="@{/danhgia/{id}(id=${item.sanPham.id})}"
                                class="btn btn-sm btn-outline-primary">
                                Đánh giá
                            </a>
                            <span th:if="${daDanhGiaSanPham[item.sanPham.id]}" class="badge bg-success">Đã đánh giá</span>
                            <span th:if="${!coTheDanhGiaSanPham[item.sanPham.id] and !daDanhGiaSanPham[item.sanPham.id]}"
                                class="text-muted">Không khả dụng</span>
                        </th:block>
                        <span th:if="${item.sanPham == null}" class="text-muted">—</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

<div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chatbot}"></div>

<div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chan_trang}"></div>
<th:block th:replace="~{clientTemplate/fragments/giao-dien-chung :: tap_lenh_chung}"></th:block>

</html>
