<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Kết quả tìm kiếm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="with-category-nav">
    <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: dau_trang_danh_muc}"></div>

    <div class="container page-content-shell">
        <h3 class="mb-3">Kết quả cho từ khóa "<span th:text="${keyword}"></span>"</h3>

        <div class="mb-3">
            <a class="btn btn-outline-primary"
                th:href="@{/timkiem(q=${keyword}, sort=${sort == 'asc' ? 'desc' : 'asc'})}">
                Sắp xếp theo giá:
                <span th:text="${sort == 'asc' ? 'Cao đến Thấp' : 'Thấp đến Cao'}"></span>
            </a>
            <a th:href="@{/timkiem(q=${keyword})}" class="btn btn-outline-secondary"
                th:classappend="${sort == null ? 'active' : ''}">Mặc định</a>
        </div>

        <div th:if="${#lists.isEmpty(ketQua)}">
            <p>Không tìm thấy sản phẩm nào.</p>
        </div>

        <div class="row">
            <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4" th:each="sp : ${ketQua}">
                <div class="product-card-image"> 
                    <a th:href="@{/chitietsanpham/{id}(id=${sp.id})}">
                    <img th:src="@{/images/product/{img}(img=${sp.hinhAnh})}"
                        class="card-img-top"
                        alt="..." />
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${sp.tenSanPham}">Tên SP</h5>
                        <p class="card-text text-danger fw-bold mt-auto"
                        th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + '₫'">
                        Giá
                        </p>
                    </div>
                    </a>
                </div>
            </div>
        </div>

    </div>
    <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chatbot}"></div>

</body>
<div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chan_trang}"></div>
<th:block th:replace="~{clientTemplate/fragments/giao-dien-chung :: tap_lenh_chung}"></th:block>

</html>
