<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="boLocCpu">
        <nav class="bg-light py-4 border-bottom">
            <div class="container">
                <form method="get" action="/sanphamcpu" class="row g-3 justify-content-center">
                    <div class="col-md-3"><label class="form-label">Thương hiệu</label>
                        <select name="thuongHieu" class="form-select">
                            <option value="">Tất cả thương hiệu</option>
                            <option th:each="th : ${dsThuongHieu}" th:value="${th}" th:text="${th}"
                                th:selected="${th == thuongHieu}"></option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="form-label">Loại CPU</label>
                        <select name="loaiCPU" class="form-select">
                            <option value="">Tất cả loại</option>
                            <option th:each="loai : ${dsLoaiCPU}" th:value="${loai}" th:text="${loai}"
                                th:selected="${loai == loaiCPU}"></option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="form-label">Số nhân số luồng</label>
                        <select name="soNhanSoLuong" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="soNhan : ${dsSoNhanSoLuong}" th:value="${soNhan}" th:text="${soNhan}"
                                th:selected="${soNhan == soNhanSoLuong}"></option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="form-label">Sắp xếp theo giá</label>
                        <select name="sort" class="form-select">
                            <option value="">Mặc định</option>
                            <option value="giaAsc" th:selected="${sort == 'giaAsc'}">Giá tăng dần</option>
                            <option value="giaDesc" th:selected="${sort == 'giaDesc'}">Giá giảm dần</option>
                        </select>
                    </div>
                </form>
            </div>
        </nav>
    </th:block>

    <th:block th:fragment="boLocRam">

                            <option value="">Tất cả thương hiệu</option>
                            <option th:each="th : ${dsThuongHieu}" th:value="${th}" th:text="${th}"
                                th:selected="${th == thuongHieu}"></option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="form-label">Chuẩn RAM</label>
                        <select name="chuanRAM" class="form-select">
                            <option value="">Tất cả loại</option>
                            <option th:each="loai : ${dsChuanRAM}" th:value="${loai}" th:text="${loai}"
                                th:selected="${loai == chuanRAM}"></option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="form-label">Dung lượng</label>
                        <select name="dungLuong" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="soNhan : ${dsDungLuong}" th:value="${soNhan}" th:text="${soNhan}"
                                th:selected="${soNhan == dungLuong}"></option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="form-label">Sắp xếp theo giá</label>
                        <select name="sort" class="form-select">
                            <option value="">Mặc định</option>
                            <option value="giaAsc" th:selected="${sort == 'giaAsc'}">Giá tăng dần</option>
                            <option value="giaDesc" th:selected="${sort == 'giaDesc'}">Giá giảm dần</option>
                        </select>
                    </div>
                </form>
            </div>
        </nav>
    </th:block>

    <th:block th:fragment="boLocMainboard">
        <nav class="bg-light py-4 border-bottom">
            <div class="container">
                <form method="get" th:action="@{/sanphammainboard}" class="row g-3 justify-content-center">
                    <div class="col-md-2">
                        <label class="form-label">Thương hiệu</label>
                        <select name="thuongHieu" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="th : ${thuongHieuSet}" th:value="${th}" th:text="${th}"
                                th:selected="${#arrays.contains(selectedThuongHieu, th)}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Model</label>
                        <select name="modelMain" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="m : ${modelMainSet}" th:value="${m}" th:text="${m}"
                                th:selected="${#arrays.contains(selectedModelMain, m)}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Chipset</label>
                        <select name="chipset" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="c : ${chipsetSet}" th:value="${c}" th:text="${c}"
                                th:selected="${#arrays.contains(selectedChipset, c)}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Socket</label>
                        <select name="socketMain" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="s : ${socketMainSet}" th:value="${s}" th:text="${s}"
                                th:selected="${#arrays.contains(selectedSocketMain, s)}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Kích thước</label>
                        <select name="kichThuoc" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="k : ${kichThuocSet}" th:value="${k}" th:text="${k}"
                                th:selected="${#arrays.contains(selectedKichThuoc, k)}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Số khe RAM</label>
                        <select name="soKheRAM" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="ram : ${soKheRAMSet}" th:value="${ram}" th:text="${ram}"
                                th:selected="${#arrays.contains(selectedSoKheRAM, ram)}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Sắp xếp theo giá</label>
                        <select name="sort" class="form-select">
                            <option value="">Mặc định</option>
                            <option value="giaAsc" th:selected="${sort == 'giaAsc'}">Giá tăng dần</option>
                            <option value="giaDesc" th:selected="${sort == 'giaDesc'}">Giá giảm dần</option>
                        </select>
                    </div>
                </form>
            </div>
        </nav>
    </th:block>

    <th:block th:fragment="boLocCooler">
        <nav class="bg-light py-4 border-bottom">
            <div class="container">
                <form method="get" action="/sanphamcooler" class="row g-3 justify-content-center">
                    <div class="col-md-3">
                        <label class="form-label">Thương hiệu</label>
                        <select name="thuongHieu" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="th : ${dsThuongHieu}" th:value="${th}" th:text="${th}"
                                th:selected="${th == thuongHieu}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Loại tản</label>
                        <select name="loaiTan" class="form-select">
                            <option value="">Tất cả</option>
                            <option th:each="k : ${dsLoaiTan}" th:value="${k}" th:text="${k}" th:selected="${k == loaiTan}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Đèn LED</label>
                        <select name="coLED" class="form-select">
                            <option value="">Tất cả</option>
                            <option value="true" th:selected="${coLED != null and coLED}">Có LED</option>
                            <option value="false" th:selected="${coLED != null and !coLED}">Không LED</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Sắp xếp theo giá</label>
                        <select name="sort" class="form-select">
                            <option value="">Mặc định</option>
                            <option value="giaAsc" th:selected="${sort == 'giaAsc'}">Giá tăng dần</option>

                        </select>
                    </div>
                </form>
            </div>
        </nav>

    <th:block th:fragment="boLocCase">

                <form method="get" action="/sanphammanhinh" class="row g-3 justify-content-center">

                            <option value="giaDesc" th:selected="${sort == 'giaDesc'}">Giá giảm dần</option>
                        </select>
                    </div>
                </form>
            </div>
        </nav>

</body>
</html>
