<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="with-category-nav">
    <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: dau_trang_danh_muc}"></div>
    <nav class="bg-light py-4 border-bottom">
        <div class="container">
            <form method="get" action="/sanphamcpu" class="row g-3 justify-content-center">
                <div class="col-md-3"><label class="form-label">Thương hiệu</label>
                    <select name="thuongHieu" class="form-select">
                        <option value="">Tất cả thương hiệu</option>
                        <option th:each="th : ${dsThuongHieu}" th:value="${th}" th:text="${th}"
                            th:selected="${th == thuongHieu}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3"><label class="form-label">Loại CPU</label>
                    <select name="loaiCPU" class="form-select">
                        <option value="">Tất cả loại</option>
                        <option th:each="loai : ${dsLoaiCPU}" th:value="${loai}" th:text="${loai}"
                            th:selected="${loai == loaiCPU}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3"><label class="form-label">Số nhân số luồng</label>
                    <select name="soNhanSoLuong" class="form-select">
                        <option value="">Tất cả</option>
                        <option th:each="soNhan : ${dsSoNhanSoLuong}" th:value="${soNhan}" th:text="${soNhan}"
                            th:selected="${soNhan == soNhanSoLuong}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3"><label class="form-label">Khoảng giá</label>
                    <input class="form-control" type="number" name="giaMin" placeholder="Giá từ" th:value="${giaMin}">
                    <input class="form-control" type="number" name="giaMax" placeholder="Đến" th:value="${giaMax}">
                </div>

                <div class="col-md-3"><label class="form-label">Sắp xếp theo</label>
                    <select name="sort" class="form-select">
                        <option value="">Mặc định</option>
                        <option value="giaAsc" th:selected="${sort == 'giaAsc'}">Giá tăng dần</option>
                        <option value="giaDesc" th:selected="${sort == 'giaDesc'}">Giá giảm dần</option>
                    </select>
                </div>


                <div class="col-12 text-center">
                    <button type="submit" class="btn btn-success px-4">Lọc</button>
                </div>
            </form>

        </div>
    </nav>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="cpu : ${dsCPU}">
            <a th:href="@{/chitietsanpham/{sanPhamID}(sanPhamID=${cpu.sanPham.id})}"
            class="card product-card h-100 text-decoration-none">
                <img th:src="@{/images/product/{img}(img=${cpu.sanPham.hinhAnh})}" class="card-img-top"
                    alt="Hình ảnh sản phẩm">
                <div class="card-body">
                    <h5 class="card-title"><br th:remove="tag" />
                        <span th:text="${cpu.sanPham.tenSanPham}"></span>
                    </h5>
                    <p class="card-text">Giá: <span
                            th:text="${#numbers.formatDecimal(cpu.sanPham.gia, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                    </p>
                </div>
            </a>
        </div>
    </div>
    <div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chatbot}"></div>
</body>
<div th:replace="~{clientTemplate/fragments/giao-dien-chung :: chan_trang}"></div>
<th:block th:replace="~{clientTemplate/fragments/giao-dien-chung :: tap_lenh_chung}"></th:block>

</html>
