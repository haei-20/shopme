spring.application.name=defaultdb

server.port=${PORT:8181}
server.address=0.0.0.0

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=180000

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type=OFF

# Naming strategy (giữ lại vì bạn đang dùng)
spring.jpa.hibernate.naming.physical-strategy=com.example.gearshop.config.TableLowerCaseNamingStrategy

# Mail (giữ nếu bạn dùng chức năng quên mật khẩu)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.forgot-password.otp-expiration-ms=300000