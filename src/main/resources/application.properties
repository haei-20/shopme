spring.application.name=defaultdb

server.port=${PORT:8181}
server.address=0.0.0.0

# Cơ sở dữ liệu
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0

# Hibernate
# Ở môi trường production nên dùng 'validate' hoặc 'none' để tránh thao tác schema khi khởi động
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type=OFF

# Tắt open-in-view để tránh lazy-loading trong quá trình render view
spring.jpa.open-in-view=false

# Bật khởi tạo bean theo lazy để giảm thời gian khởi động (tăng độ trễ cho request đầu tiên)
spring.main.lazy-initialization=true

spring.jpa.hibernate.naming.physical-strategy=com.example.gearshop.config.TableLowerCaseNamingStrategy

# Cấu hình SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.forgot-password.otp-expiration-ms=300000