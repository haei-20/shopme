<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat với Ollama</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h2{
    text-align:center;
}

#chat{
    background:white;
    height:550px;
    overflow-y:auto;
    border-radius:10px;
    padding:15px;
    border:1px solid #ddd;
}

.message{
    margin:12px 0;
    max-width:80%;
    padding:10px 14px;
    border-radius:12px;
    line-height:1.5;
    white-space:pre-wrap;
}

.user{
    margin-left:auto;
    background:#d7ebff;
}

.bot{
    background:#e8e8e8;
}

.controls{
    margin-top:10px;
}

textarea{
    width:100%;
    height:80px;
    resize:none;
    padding:10px;
    box-sizing:border-box;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    margin-top:10px;
    padding:10px 20px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
}

button:hover{
    opacity:.9;
}

.loading{
    color:#666;
    font-style:italic;
}

</style>
</head>
<body>

<div class="container">

    <h2>Chat với LLM Local (Ollama)</h2>

    <div id="chat"></div>

    <div class="controls">

        <textarea
            id="prompt"
            placeholder="Nhập nội dung..."
        ></textarea>

        <button onclick="sendMessage()">
            Gửi
        </button>

    </div>

</div>

<script>

const chat = document.getElementById("chat");
const promptInput = document.getElementById("prompt");

let messages = [
{
    role: "system",
    content:
        "Bạn là trợ lý AI. " +
        "Luôn trả lời bằng tiếng Việt. " +
        "Không sử dụng ngôn ngữ khác nếu người dùng dùng tiếng Việt."
}
];

function addMessage(text, cls){

    const div = document.createElement("div");

    div.className = `message ${cls}`;

    div.textContent = text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;

    return div;
}

async function sendMessage(){

    const prompt = promptInput.value.trim();

    if(!prompt) return;

    addMessage("Bạn: " + prompt, "user");

    messages.push({
        role:"user",
        content:prompt
    });

    promptInput.value = "";

    const loading = addMessage(
        "AI đang trả lời...",
        "bot loading"
    );

    try{

        const response = await fetch(
            "http://localhost:11434/api/chat",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    model:"qwen2.5:7b",
                    messages:messages,
                    stream:false
                })
            }
        );

        const data = await response.json();

        console.log(data);

        loading.remove();

        if(data.error){

            addMessage(
                "Lỗi: " + data.error,
                "bot"
            );

            return;
        }

        let answer =
            data?.message?.content ||
            "Không nhận được phản hồi.";

        // Loại bỏ ký tự tiếng Trung nếu có
        answer = answer.replace(
            /[\u4E00-\u9FFF]/g,
            ""
        );

        messages.push({
            role:"assistant",
            content:answer
        });

        addMessage(
            "AI: " + answer,
            "bot"
        );

    }
    catch(err){

        loading.remove();

        addMessage(
            "Không kết nối được Ollama: " +
            err.message,
            "bot"
        );
    }
}

promptInput.addEventListener(
    "keydown",
    function(e){

        if(
            e.key === "Enter" &&
            !e.shiftKey
        ){
            e.preventDefault();
            sendMessage();
        }
    }
);

</script>

</body>
</html>
